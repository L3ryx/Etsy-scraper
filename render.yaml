services:
  - type: web
    name: etsy-shop-analyzer
    runtime: python
    buildCommand: pip install -r render_requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: SCRAPERAPI_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
